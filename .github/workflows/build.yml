name: Build Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch dictionary
        run: npm run fetch-dict

      - name: Build Firefox
        run: npm run build

      - name: Package Firefox (xpi/zip)
        run: npx web-ext build --config web-ext.config.mjs --overwrite-dest

      - name: Build Chrome
        run: npm run build:chrome

      - name: Package Chrome (zip)
        run: npx web-ext build --source-dir dist-chrome --artifacts-dir artifacts --overwrite-dest --filename yukari_rubi-chrome-${{ github.ref_name || 'dev' }}.zip

      - name: Rename Firefox artifact
        run: |
          for f in artifacts/yukari_rubi-*.zip; do
            case "$f" in *chrome*) continue ;; esac
            mv "$f" "artifacts/yukari_rubi-firefox-${{ github.ref_name || 'dev' }}.zip"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yukari-rubi-${{ github.ref_name || 'dev' }}
          path: artifacts/*.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
