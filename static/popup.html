<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        padding: 12px;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        margin: 0;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px 0;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ccc;
      }
      .status-dot.active {
        background: #22c55e;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #f9fafb;
        cursor: pointer;
        margin-bottom: 8px;
      }
      button:hover {
        background: #e5e7eb;
      }
      button:active {
        background: #d1d5db;
      }
      .settings {
        border-top: 1px solid #e5e7eb;
        padding-top: 8px;
        margin-top: 4px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      .shortcut {
        font-size: 11px;
        color: #6b7280;
        margin-top: 8px;
        text-align: center;
      }
      kbd {
        background: #e5e7eb;
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 11px;
        font-family: monospace;
      }
      .size-control {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }
      .size-control span.label {
        font-size: 13px;
        flex-shrink: 0;
      }
      .size-control button {
        width: 32px;
        padding: 4px 0;
        margin-bottom: 0;
        font-size: 16px;
        line-height: 1;
      }
      .size-control .size-value {
        font-size: 13px;
        min-width: 36px;
        text-align: center;
      }
      .size-warning {
        color: #d97706;
        font-size: 11px;
        margin-top: 4px;
      }
      .auto-enable {
        border-top: 1px solid #e5e7eb;
        padding-top: 8px;
        margin-top: 8px;
      }
      .auto-enable h2 {
        font-size: 13px;
        margin: 0 0 6px 0;
        font-weight: 600;
      }
      .auto-enable .add-row {
        display: flex;
        gap: 4px;
        margin-bottom: 4px;
      }
      .auto-enable input[type="text"] {
        flex: 1;
        padding: 4px 6px;
        font-size: 12px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        min-width: 0;
      }
      .auto-enable .add-row button {
        width: auto;
        padding: 4px 8px;
        font-size: 12px;
        margin-bottom: 0;
        flex-shrink: 0;
      }
      .auto-enable .add-site-btn {
        width: 100%;
        padding: 4px 8px;
        font-size: 12px;
        margin-bottom: 4px;
      }
      .pattern-list {
        max-height: 120px;
        overflow-y: auto;
      }
      .pattern-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        padding: 3px 0;
        font-size: 11px;
        border-bottom: 1px solid #f3f4f6;
      }
      .pattern-item span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .pattern-item button {
        width: auto;
        padding: 1px 6px;
        font-size: 11px;
        margin-bottom: 0;
        color: #dc2626;
        border-color: #fecaca;
        flex-shrink: 0;
      }
      .pattern-hint {
        font-size: 10px;
        color: #9ca3af;
        margin-top: 2px;
      }
      .error {
        color: #dc2626;
        font-size: 12px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h1>ゆかり ルビ</h1>
    <div class="status">
      <span class="status-dot" id="dot"></span>
      <span id="status-text">Inactive</span>
    </div>
    <button id="toggle-btn">Enable Furigana</button>
    <div class="settings">
      <label>
        <input type="checkbox" id="mutation-cb" />
        Watch for new content
      </label>
      <div class="size-control">
        <span class="label">ルビサイズ</span>
        <button id="size-dec">−</button>
        <span class="size-value" id="size-value">50%</span>
        <button id="size-inc">＋</button>
      </div>
      <div class="size-warning" id="size-warning" hidden>
        大きいサイズはレイアウトが崩れる場合があります
      </div>
    </div>
    <div class="auto-enable">
      <h2>自動有効化サイト</h2>
      <button class="add-site-btn" id="add-current-site">このサイトを追加</button>
      <div class="add-row">
        <input type="text" id="pattern-input" placeholder="*://example.com/*" />
        <button id="add-pattern-btn">追加</button>
      </div>
      <div class="pattern-list" id="pattern-list"></div>
      <div class="pattern-hint">* = 任意の文字列、** = パス全体</div>
    </div>
    <div class="shortcut">
      Shortcut: <kbd>Alt</kbd>+<kbd>F</kbd>
    </div>
    <div class="error" id="error" hidden></div>
    <script src="popup.js"></script>
  </body>
</html>
